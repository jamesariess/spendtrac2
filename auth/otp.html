<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP - SpendTrack</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/main.css">
    <link rel="stylesheet" href="../assets/css/otp.css">
</head>
<body>
    <div class="content">
        <div class="station1 fade-in">
            <div class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="logo-icon">
                    <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
                </svg>
                SpendTrack
            </div>
            <div class="otpword">
                <h3>Verify Your Identity</h3>
                <p class="subtitle" id="otpSubtitle">Enter the 6-digit code sent to your email</p>
            </div>
        </div>
        <form class="otp-form">
            <div class="container-number">
                <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]*" class="box otp-input" id="otp-1" autocomplete="one-time-code">
                <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]*" class="box otp-input" id="otp-2" autocomplete="one-time-code">
                <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]*" class="box otp-input" id="otp-3" autocomplete="one-time-code">
                <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]*" class="box otp-input" id="otp-4" autocomplete="one-time-code">
                <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]*" class="box otp-input" id="otp-5" autocomplete="one-time-code">
                <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]*" class="box otp-input" id="otp-6" autocomplete="one-time-code">
            </div>
            <div class="error-message" id="error-msg"></div>
        </form>
        <div class="last-section">
            <button type="submit" class="verify-btn">Verify OTP</button>
            <p class="resend"><span id="timer">00:60</span> <a href="#" id="resend-link">Resend code</a></p>
            <p><a href="#" id="backLink">← Go back to login</a></p>
        </div>
    </div>
    <script>
    // Detect signup vs login mode
    const urlParams = new URLSearchParams(window.location.search);
    const isSignupMode = urlParams.get('mode') === 'signup';
    const otpSubtitle = document.getElementById('otpSubtitle');
    const backLink = document.getElementById('backLink');

    // Update subtitle and back link based on mode
    if (isSignupMode) {
        otpSubtitle.textContent = 'Enter the 6-digit code sent to your email to complete signup';
        backLink.href = 'signup.html';
        backLink.textContent = '← Go back to signup';
    } else {
        backLink.href = 'login.html';
    }

    const inputs = document.querySelectorAll('.otp-input');
    let resendDisabled = false;
    let timeRemaining = 60;

    // Timer function
    function startTimer() {
        const timerElement = document.getElementById('timer');
        timeRemaining = 60;
        resendDisabled = true;
        document.getElementById('resend-link').style.pointerEvents = 'none';
        document.getElementById('resend-link').style.opacity = '0.5';

        const countdown = setInterval(() => {
            timeRemaining--;
            const mins = Math.floor(timeRemaining / 60);
            const secs = timeRemaining % 60;
            timerElement.textContent = `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;

            if (timeRemaining <= 0) {
                clearInterval(countdown);
                resendDisabled = false;
                document.getElementById('resend-link').style.pointerEvents = 'auto';
                document.getElementById('resend-link').style.opacity = '1';
            }
        }, 1000);
    }

    // Start timer on page load
    window.addEventListener('load', startTimer);

    inputs.forEach((input, index) =>{
        input.addEventListener('input',(e) =>{
            e.target.value = e.target.value.replace(/[^0-9]/g,'');

            if(e.target.value.length === 1 && index < inputs.length -1 ){
                inputs[index + 1].focus();
            }
        });
        input.addEventListener('keydown',(e) =>{
            if(e.key === 'Backspace' && index > 0){
                inputs[index - 1].focus();
            }
        });

        input.addEventListener('paste', (e) => {
        e.preventDefault();

        const pasteData = (e.clipboardData || window.clipboardData)
            .getData('text')
            .replace(/[^0-9]/g, '');

        if (!pasteData) return;

        inputs.forEach((input, i) => {
            input.value = pasteData[i] || '';
        });

        // Focus last filled box
        const lastIndex = Math.min(pasteData.length, inputs.length) - 1;
        if (lastIndex >= 0) {
            inputs[lastIndex].focus();
        }
    });
    });

    // Resend OTP
    document.getElementById('resend-link').addEventListener('click', async (e) => {
        e.preventDefault();

        if (resendDisabled) return;

        try {
            const res = await fetch('../frameworks/resend_otp.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' }
            });

            const data = await res.json();

            if (data.success) {
                document.getElementById('error-msg').textContent = 'OTP resent to your email!';
                document.getElementById('error-msg').style.color = '#10b981';
                startTimer();
            } else {
                document.getElementById('error-msg').textContent = data.message || 'Failed to resend OTP';
                document.getElementById('error-msg').style.color = '#ef4444';
            }
        } catch (error) {
            document.getElementById('error-msg').textContent = 'Error resending OTP';
            document.getElementById('error-msg').style.color = '#ef4444';
        }
    });

    // Verify OTP
    document.querySelector('.verify-btn').addEventListener('click', async () => {

        const inputs = document.querySelectorAll('.otp-input');
        let otp = '';

        inputs.forEach(input => otp += input.value);

        if (otp.length !== 6) {
            document.getElementById('error-msg').textContent = "Enter complete OTP";
            document.getElementById('error-msg').style.color = '#ef4444';
            return;
        }

        const res = await fetch('../frameworks/verify_otp.php', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ otp })
        });

        const data = await res.json();

        if (data.success) {
            // For signup mode, we need to complete the signup first
            if (isSignupMode) {
                // Call complete_signup endpoint
                try {
                    const completeRes = await fetch('../frameworks/complete_signup.php', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' }
                    });

                    const completeData = await completeRes.json();

                    if (completeData.success) {
                        // Clear signup data from localStorage
                        localStorage.removeItem('signupEmail');

                        // Redirect to login
                        window.location.href = '../auth/login.html?signup=success';
                    } else {
                        document.getElementById('error-msg').textContent = completeData.message || 'Failed to complete signup';
                        document.getElementById('error-msg').style.color = '#ef4444';
                    }
                } catch (error) {
                    document.getElementById('error-msg').textContent = 'Error completing signup';
                    document.getElementById('error-msg').style.color = '#ef4444';
                }
            } else {
                // Login mode - go to dashboard
                window.location.href = '../pages/dashboard.html';
            }
        } else {
            document.getElementById('error-msg').textContent = data.message;
            document.getElementById('error-msg').style.color = '#ef4444';
        }
    });
    </script>
</body>
</html>
