<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budget | SpendTrackFinance</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #4F46E5;
            --primary-dark: #4338ca;
            --secondary: #3B82F6;
            --accent: #8B5CF6;
            --bg-light: #F8FAFC;
            --bg-white: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
            --radius: 12px;
            --transition: all 0.3s ease;
            --success: #22c55e;
            --warning: #f59e0b;
            --danger: #ef4444;
            --sidebar-width: 260px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            background-color: var(--bg-light);
            line-height: 1.6;
            min-height: 100vh;
        }

        a { text-decoration: none; color: inherit; transition: var(--transition); }
        ul { list-style: none; }
        button { font-family: inherit; cursor: pointer; border: none; }

        .dashboard-layout { display: flex; min-height: 100vh; }

        .sidebar {
            width: var(--sidebar-width);
            background: var(--bg-white);
            border-right: 1px solid var(--border);
            position: fixed;
            height: 100vh;
            display: flex;
            flex-direction: column;
            z-index: 100;
            transition: var(--transition);
        }

        .sidebar-header { padding: 24px; border-bottom: 1px solid var(--border); }

        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-main);
        }

        .sidebar-logo svg { color: var(--primary); }

        .sidebar-nav { flex: 1; padding: 16px 12px; overflow-y: auto; }

        .nav-section { margin-bottom: 24px; }

        .nav-section-title {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            padding: 0 12px;
            margin-bottom: 8px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: var(--radius);
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 4px;
            transition: var(--transition);
            cursor: pointer;
        }

        .nav-item:hover { background: var(--bg-light); color: var(--text-main); }

        .nav-item.active { background: #e0e7ff; color: var(--primary); }

        .nav-item svg { width: 20px; height: 20px; flex-shrink: 0; }

        .sidebar-footer { padding: 16px; border-top: 1px solid var(--border); }

        .user-card {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: var(--radius);
            background: var(--bg-light);
            cursor: pointer;
            transition: var(--transition);
        }

        .user-card:hover { background: #e0e7ff; }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .user-info { flex: 1; min-width: 0; }

        .user-name { font-size: 0.9rem; font-weight: 600; color: var(--text-main); }
        .user-email { font-size: 0.75rem; color: var(--text-muted); }

        .main-content { flex: 1; margin-left: var(--sidebar-width); min-height: 100vh; }

        .top-header {
            background: var(--bg-white);
            border-bottom: 1px solid var(--border);
            padding: 16px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .header-left { display: flex; align-items: center; gap: 24px; }
        .page-title { font-size: 1.25rem; font-weight: 600; }

        .header-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-light);
            color: var(--text-muted);
            transition: var(--transition);
        }

        .header-btn:hover { background: #e0e7ff; color: var(--primary); }
        .header-btn svg { width: 20px; height: 20px; }

        .budget-content { padding: 32px; }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }

        .page-header h1 { font-size: 1.5rem; font-weight: 700; }

        .month-selector {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .month-selector button {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--bg-white);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .month-selector button:hover { background: var(--bg-light); }

        .month-selector span { font-weight: 600; min-width: 140px; text-align: center; }

        .budget-overview {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
            margin-bottom: 32px;
        }

        .overview-card {
            background: var(--bg-white);
            border-radius: var(--radius);
            padding: 24px;
            border: 1px solid var(--border);
        }

        .overview-card h3 {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .overview-card .amount {
            font-size: 1.75rem;
            font-weight: 700;
        }

        .overview-card.income .amount { color: var(--success); }
        .overview-card.expense .amount { color: var(--danger); }
        .overview-card.budget .amount { color: var(--primary); }

        .budget-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
            margin-bottom: 32px;
        }

        .budget-card {
            background: var(--bg-white);
            border-radius: var(--radius);
            padding: 24px;
            border: 1px solid var(--border);
        }

        .budget-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .budget-card-header h3 { font-size: 1rem; font-weight: 600; }

        .category-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .category-icon.food { background: #fef3c7; color: #d97706; }
        .category-icon.transport { background: #dbeafe; color: #2563eb; }
        .category-icon.shopping { background: #fce7f3; color: #db2777; }
        .category-icon.bills { background: #fee2e2; color: #dc2626; }
        .category-icon.entertainment { background: #e0e7ff; color: #4f46e5; }

        .budget-progress {
            margin-bottom: 16px;
        }

        .progress-bar {
            height: 8px;
            background: var(--bg-light);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .progress-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        .progress-fill.safe { background: var(--success); }
        .progress-fill.warning { background: var(--warning); }
        .progress-fill.danger { background: var(--danger); }

        .budget-details {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .budget-details .spent { color: var(--text-main); font-weight: 600; }

        .add-budget-card {
            background: var(--bg-white);
            border-radius: var(--radius);
            padding: 24px;
            border: 2px dashed var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 200px;
            cursor: pointer;
            transition: var(--transition);
        }

        .add-budget-card:hover { border-color: var(--primary); background: #f8fafc; }

        .add-budget-card svg {
            width: 40px;
            height: 40px;
            color: var(--text-muted);
            margin-bottom: 12px;
        }

        .add-budget-card span { color: var(--text-muted); font-weight: 500; }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: var(--transition);
        }

        .modal-overlay.show { opacity: 1; visibility: visible; }

        .modal {
            background: var(--bg-white);
            border-radius: var(--radius);
            width: 100%;
            max-width: 450px;
            transform: scale(0.9);
            transition: var(--transition);
        }

        .modal-overlay.show .modal { transform: scale(1); }

        .modal-header {
            padding: 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .modal-title { font-size: 1.125rem; font-weight: 600; }

        .modal-close {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-light);
            color: var(--text-muted);
        }

        .modal-close:hover { background: #fee2e2; color: var(--danger); }

        .modal-body { padding: 24px; }

        .form-group { margin-bottom: 20px; }

        .form-label {
            display: block;
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .form-input, .form-select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-size: 0.9rem;
            transition: var(--transition);
        }

        .form-input:focus, .form-select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        .modal-footer {
            padding: 16px 24px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 10px 20px;
            border-radius: var(--radius);
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: var(--transition);
            border: none;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-dark); }
        .btn-secondary { background: var(--bg-light); color: var(--text-main); }
        .btn-secondary:hover { background: var(--border); }
        .btn-danger { background: var(--danger); color: white; }
        .btn-danger:hover { background: #dc2626; }

        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--text-main);
            color: white;
            padding: 12px 24px;
            border-radius: var(--radius);
            font-weight: 500;
            z-index: 2000;
            opacity: 0;
            transition: all 0.3s ease;
        }

        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .toast.success { background: var(--success); }
        .toast.error { background: var(--danger); }

        @media (max-width: 1200px) {
            .budget-overview { grid-template-columns: 1fr; }
            .budget-grid { grid-template-columns: 1fr; }
        }

        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.show { transform: translateX(0); }
            .main-content { margin-left: 0; }
            .budget-content { padding: 16px; }
            .page-header { flex-direction: column; gap: 16px; align-items: flex-start; }
        }
    </style>
</head>

            <div class="sidebar-footer">

    <div class="modal-overlay" id="budgetModal">

            <div class="modal-header">

                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

            </div>

                    <input type="hidden" id="budgetCategory">
                    <div class="form-group">
                        <label class="form-label">Category</label>
                        <select class="form-select" id="categorySelect" required>
                            <option value="food">Food & Dining</option>
                            <option value="transport">Transport</option>
                            <option value="shopping">Shopping</option>
                            <option value="bills">Bills & Utilities</option>
                            <option value="entertainment">Entertainment</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Monthly Budget</label>
                        <input type="number" class="form-input" id="budgetAmount" placeholder="0.00" step="0.01" min="0" required>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-danger" id="deleteBudgetBtn" style="display: none; margin-right: auto;" onclick="deleteBudget()">Delete</button>
                <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                <button class="btn btn-primary" onclick="saveBudget()">Save Budget</button>
            </div>
        </div>

    <div class="toast" id="toast"></div>

    <script>
        if (localStorage.getItem('isLoggedIn') !== 'true') {
            window.location.href = 'login.html';
        }

        let currentDate = new Date();
        let budgets = JSON.parse(localStorage.getItem('budgets')) || {};
        let transactions = JSON.parse(localStorage.getItem('transactions')) || [];

        const categoryIcons = {
            food: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>',
            transport: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>',
            shopping: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>',
            bills: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>',
            entertainment: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="15" rx="2" ry="2"/><polyline points="17 2 12 7 7 2"/></svg>'
        };

        const categoryLabels = {
            food: 'Food & Dining',
            transport: 'Transport',
            shopping: 'Shopping',
            bills: 'Bills & Utilities',
            entertainment: 'Entertainment'
        };

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('show');
        }

        function changeMonth(delta) {
            currentDate.setMonth(currentDate.getMonth() + delta);
            renderBudget();
        }

        function formatCurrency(amount) {
            return '$' + parseFloat(amount).toFixed(2).replace(/\d(?=(\d{3})+\.)/g, '$&,');
        }

        function getMonthKey() {
            return currentDate.toISOString().slice(0, 7);
        }

        function getMonthTransactions() {
            const monthKey = getMonthKey();
            return transactions.filter(t => t.date.startsWith(monthKey) && t.type === 'expense');
        }

        function getSpentByCategory() {
            const monthTxns = getMonthTransactions();
            const spent = {};
            monthTxns.forEach(t => {
                spent[t.category] = (spent[t.category] || 0) + t.amount;
            });
            return spent;
        }

        function updateStats() {
            const monthTxns = getMonthTransactions();
            const income = transactions
                .filter(t => t.date.startsWith(getMonthKey()) && t.type === 'income')
                .reduce((sum, t) => sum + t.amount, 0);
            const spent = monthTxns.reduce((sum, t) => sum + t.amount, 0);
            
            document.getElementById('totalIncome').textContent = formatCurrency(income);
            document.getElementById('totalSpent').textContent = formatCurrency(spent);
            document.getElementById('remainingBudget').textContent = formatCurrency(income - spent);
        }

        function renderBudget() {
            const monthNames = ['January', 'February', 'March', 'April', 'May', 'June', 
                              'July', 'August', 'September', 'October', 'November', 'December'];
            document.getElementById('currentMonth').textContent = 
                `${monthNames[currentDate.getMonth()]} ${currentDate.getFullYear()}`;

            const spent = getSpentByCategory();
            const monthKey = getMonthKey();
            const monthBudgets = budgets[monthKey] || {};
            
            const grid = document.getElementById('budgetGrid');
            let html = '';

            Object.keys(categoryLabels).forEach(cat => {
                const budget = monthBudgets[cat] || 0;
                const spentAmount = spent[cat] || 0;
                const percent = budget > 0 ? Math.min((spentAmount / budget) * 100, 100) : 0;
                
                let status = 'safe';
                if (percent >= 100) status = 'danger';
                else if (percent >= 80) status = 'warning';

                html += `
                    <div class="budget-card" onclick="openBudgetModal('${cat}')">
                        <div class="budget-card-header">
                            <div>
                                <h3>${categoryLabels[cat]}</h3>
                                <small style="color: var(--text-muted);">${budget > 0 ? 'Budget: ' + formatCurrency(budget) : 'No budget set'}</small>
                            </div>
                            <div class="category-icon ${cat}">${categoryIcons[cat]}</div>
                        </div>
                        <div class="budget-progress">
                            <div class="progress-bar">
                                <div class="progress-fill ${status}" style="width: ${percent}%"></div>
                            </div>
                            <div class="budget-details">
                                <span class="spent">${formatCurrency(spentAmount)} spent</span>
                                <span>${budget > 0 ? formatCurrency(budget - spentAmount) + ' left' : 'Set budget'}</span>
                            </div>
                        </div>
                    </div>
                `;
            });

            html += `
                <div class="add-budget-card" onclick="openBudgetModal('')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
                    </svg>
                    <span>Add Budget</span>
                </div>
            `;

            grid.innerHTML = html;
            updateStats();
        }

        function openBudgetModal(category) {
            document.getElementById('budgetModal').classList.add('show');
            const monthKey = getMonthKey();
            const monthBudgets = budgets[monthKey] || {};
            
            if (category) {
                document.getElementById('categorySelect').value = category;
                document.getElementById('categorySelect').disabled = true;
                document.getElementById('budgetAmount').value = monthBudgets[category] || '';
                document.getElementById('deleteBudgetBtn').style.display = monthBudgets[category] ? 'block' : 'none';
            } else {
                document.getElementById('categorySelect').disabled = false;
                document.getElementById('categorySelect').value = 'food';
                document.getElementById('budgetAmount').value = '';
                document.getElementById('deleteBudgetBtn').style.display = 'none';
            }
        }

        function closeModal() {
            document.getElementById('budgetModal').classList.remove('show');
        }

        function saveBudget() {
            const category = document.getElementById('categorySelect').value;
            const amount = parseFloat(document.getElementById('budgetAmount').value);
            
            if (!amount || amount <= 0) {
                showToast('Please enter a valid budget amount', 'error');
                return;
            }

            const monthKey = getMonthKey();
            if (!budgets[monthKey]) budgets[monthKey] = {};
            budgets[monthKey][category] = amount;
            
            localStorage.setItem('budgets', JSON.stringify(budgets));
            showToast('Budget saved successfully!', 'success');
            closeModal();
            renderBudget();
        }

        function deleteBudget() {
            const category = document.getElementById('categorySelect').value;
            const monthKey = getMonthKey();
            
            if (budgets[monthKey] && budgets[monthKey][category]) {
                delete budgets[monthKey][category];
                localStorage.setItem('budgets', JSON.stringify(budgets));
                showToast('Budget deleted successfully!', 'success');
                closeModal();
                renderBudget();
            }
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast ' + type + ' show';
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function logout() {
            if (confirm('Are you sure you want to logout?')) {
                localStorage.removeItem('isLoggedIn');
                window.location.href = 'login.html';
            }
        }

        document.getElementById('budgetModal').addEventListener('click', (e) => {
            if (e.target.classList.contains('modal-overlay')) closeModal();
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });

        renderBudget();
    </script>
</body>
</html>
